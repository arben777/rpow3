app = "rpow2-server"
primary_region = "iad"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  PORT = "8080"
  WEB_ORIGIN = "https://rpow2.com"
  MAGIC_LINK_BASE_URL = "https://api.rpow2.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "15s"
    timeout = "3s"
